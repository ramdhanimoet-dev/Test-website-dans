<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>DansFahiraaa · modern store</title>
  <!-- Font & icons (clean, modern) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f2f4f8; /* fallback, image will overlay */
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 0 0 24px 0;
      /* background image with overlay for readability */
      background-image: url('https://files.catbox.moe/umxu2k.jpg');
      background-size: cover;
      background-position: center 20%;
      background-repeat: no-repeat;
      background-attachment: fixed;
      position: relative;
    }

    /* semi-transparent overlay so text is crisp */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(2px);
      z-index: 0;
      pointer-events: none;
    }

    /* main container sits above overlay */
    .store-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 400px; /* ideal hp width */
      margin: 16px auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 0 16px;
    }

    /* ----- header card ----- */
    .header-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 32px;
      padding: 14px 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0,0,0,0.05);
      border: 1px solid rgba(255,255,255,0.5);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-img {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      object-fit: cover;
      background: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      border: 2px solid white;
    }

    .brand-text {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(145deg, #1a1e2b, #2d3349);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    /* ----- product card (modern, glassmorphism) ----- */
    .product-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 36px;
      padding: 22px 18px 20px 18px;
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 20px 35px -8px rgba(0,0,0,0.2);
      transition: transform 0.2s;
    }

    .product-image {
      width: 100%;
      border-radius: 28px;
      overflow: hidden;
      background: #f0eff5;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05), 0 10px 20px -10px rgba(0,0,0,0.2);
      margin-bottom: 16px;
    }

    .product-image img {
      width: 100%;
      height: auto;
      display: block;
      transition: scale 0.2s;
    }

    .desc-area {
      padding: 4px 6px 12px 6px;
    }

    .product-title {
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1.2;
      color: #1f1f2b;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .detail-list {
      background: rgba(245, 245, 250, 0.7);
      border-radius: 22px;
      padding: 16px 18px;
      margin: 10px 0 16px 0;
      font-size: 1rem;
      color: #1d1e2c;
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }

    .detail-list p {
      margin: 6px 0;
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
    }

    .detail-list .label {
      font-weight: 600;
      min-width: 82px;
      color: #2d2f4a;
    }

    .detail-list .value {
      font-weight: 500;
      color: #111;
    }

    .price-tag {
      font-size: 1.7rem;
      font-weight: 800;
      background: linear-gradient(135deg, #1f2937, #111827);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-left: 8px;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 12px 0 16px 0;
    }

    .btn {
      border: none;
      border-radius: 60px;
      padding: 16px 22px;
      font-weight: 600;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: white;
      box-shadow: 0 6px 16px rgba(0,0,0,0.05);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.7);
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      color: #1e1e2a;
    }

    .btn i {
      font-size: 1.3rem;
      opacity: 0.8;
    }

    .btn-spek {
      background: rgba(20, 30, 45, 0.9);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 25px -8px rgba(0,40,80,0.4);
    }

    .btn-spek i {
      color: #b2c9ff;
    }

    .btn-wa {
      background: rgba(37, 211, 102, 0.85);
      color: #0b2b1a;
      border: 1px solid rgba(255,255,255,0.6);
      font-weight: 700;
      backdrop-filter: blur(4px);
    }

    .btn-wa i {
      color: #075e23;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .reminder-text {
      background: rgba(10, 15, 30, 0.2);
      border-radius: 60px;
      padding: 14px 18px;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 500;
      color: #11131f;
      backdrop-filter: blur(4px);
      border: 1px dashed rgba(0,0,0,0.15);
      margin-top: 6px;
    }

    .reminder-text i {
      margin-right: 6px;
      color: #2b3b4b;
    }

    /* link untuk spek (halaman lain pura2, pakai jangkar ke modal / dummy) */
    .spek-link {
      text-decoration: none;
      width: 100%;
    }

    /* mini modal untuk "halaman lain" – simple spek lengkap overlay */
    .spek-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.3);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .spek-card {
      background: rgba(255, 255, 255, 0.95);
      width: 90%;
      max-width: 380px;
      border-radius: 48px;
      padding: 28px 24px;
      box-shadow: 0 40px 70px rgba(0,0,0,0.4);
      text-align: center;
      border: 2px solid white;
      animation: fadePop 0.2s;
    }

    @keyframes fadePop {
      0% { opacity: 0.5; transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1); }
    }

    .spek-card h3 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #141b29;
    }

    .foto-lengkap-grid {
      background: #eaeef5;
      border-radius: 28px;
      padding: 24px 12px;
      margin: 15px 0;
      background-image: repeating-linear-gradient(45deg, rgba(0,0,0,0.02) 0px, rgba(0,0,0,0.02) 10px, transparent 10px, transparent 20px);
    }

    .mockup-foto {
      font-size: 5rem;
      filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
    }

    .foto-lengkap-grid p {
      margin-top: 10px;
      font-weight: 500;
      color: #1f2a3f;
    }

    .btn-tutup {
      background: #212529;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 16px 20px;
      font-size: 1.2rem;
      width: 100%;
      font-weight: 600;
      margin-top: 10px;
      cursor: pointer;
    }

    .btn-tutup i {
      margin-right: 8px;
    }

    /* footer / credit small (optional) */
    .credit-note {
      color: rgba(20,20,30,0.6);
      font-size: 0.75rem;
      text-align: center;
      margin-top: 8px;
    }

    /* spacing */
    .spacer {
      height: 4px;
    }
  </style>
</head>
<body>
  <div class="store-container">

    <!-- header dengan logo + text -->
    <div class="header-card">
      <img src="https://imgur.com/a/BJrKsEq" alt="logo DansFahiraaa" class="logo-img" loading="lazy">
      <span class="brand-text">DansFahiraaa</span>
    </div>

    <!-- product card utama -->
    <div class="product-card">
      <div class="product-image">
        <img src="https://imgur.com/a/BJrKsEq" alt="Produk Monsep" loading="lazy">
      </div>

      <div class="desc-area">
        <!-- deskripsi sesuai permintaan -->
        <div class="detail-list">
          <p><span class="label">𝗠𝗢𝗡𝗦𝗘𝗣</span></p>
          <p><span class="label">TAKE SGMAIL FRESH</span> <span class="value">-PLAT GOOGLE R</span></p>
          <p style="margin-top: 12px;"><span class="label">𝗛𝗔𝗥𝗚𝗔</span> <span class="value price-tag">idr 22.000</span></p>
        </div>

        <!-- dua button: SPEK LENGKAP dan PESAN VIA WA -->
        <div class="button-group">
          <!-- spek lengkap trigger modal / "halaman lain" -->
          <a href="javascript:void(0);" class="spek-link" id="showSpekBtn">
            <div class="btn btn-spek">
              <i class="fa-solid fa-microchip"></i> SPEK LENGKAP
            </div>
          </a>

          <!-- PESAN VIA WA (link langsung) -->
          <a href="https://wa.me//6283878779524?text=Halo%20DansFahiraaa%2C%20saya%20mau%20order%20MONSESP%20SGMAIL%20FRESH%20%7C%20idr%2022.000" target="_blank" class="spek-link">
            <div class="btn btn-wa">
              <i class="fa-brands fa-whatsapp"></i> PESAN VIA WA
            </div>
          </a>
        </div>

        <!-- deskripsi tambahan "Harap Sertakan Screenshot ..." -->
        <div class="reminder-text">
          <i class="fa-regular fa-camera"></i> Harap Sertakan Screenshot Akun Yang Ingin Anda Beli
        </div>
      </div>
    </div>

    <!-- sedikit catatan tampilan (bukan bagian utama) -->
    <div class="credit-note">
      <i class="fa-regular fa-heart"></i> trusted modern store
    </div>
  </div>

  <!-- SPEK LENGKAP OVERLAY / HALAMAN LAIN (berisi foto lengkap) -->
  <div class="spek-overlay" id="spekOverlay">
    <div class="spek-card">
      <h3>✨ SPEK LENGKAP</h3>
      <div class="foto-lengkap-grid">
        <div class="mockup-foto">
          <i class="fa-solid fa-image"></i> <i class="fa-solid fa-images"></i>
        </div>
        <!-- foto lengkap dari barang (gunakan gambar yang sama untuk contoh / bisa diganti jika ada link khusus) 
             sesuai instruksi "foto lengkap dari barang tersebut", tapi karena tidak diberi link khusus, saya tampilkan preview visual -->
        <img src="https://files.catbox.moe/6v98ew.png" alt="foto lengkap" style="width:100%; border-radius:28px; margin:10px 0; border:2px solid white; box-shadow: 0 8px 15px rgba(0,0,0,0.2);">
        <p style="font-weight: 600;">📸 unit real pict · include semua aksesoris</p>
        <p style="opacity:0.7; font-size:0.9rem;">(tampilan foto dokumentasi lengkap)</p>
      </div>
      <button class="btn-tutup" id="closeSpekBtn"><i class="fa-regular fa-circle-xmark"></i> TUTUP</button>
    </div>
  </div>

  <script>
    (function() {
      // ambil elemen
      const showBtn = document.getElementById('showSpekBtn');
      const overlay = document.getElementById('spekOverlay');
      const closeBtn = document.getElementById('closeSpekBtn');

      // fungsi buka overlay (simulasi halaman lain)
      if (showBtn) {
        showBtn.addEventListener('click', function(e) {
          e.preventDefault();
          overlay.style.display = 'flex';
          // sedikit efek scroll lock biar fokus
          document.body.style.overflow = 'hidden';
        });
      }

      // fungsi tutup
      if (closeBtn) {
        closeBtn.addEventListener('click', function() {
          overlay.style.display = 'none';
          document.body.style.overflow = 'auto';
        });
      }

      // klik background overlay bisa tutup (optional)
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) {
          overlay.style.display = 'none';
          document.body.style.overflow = 'auto';
        }
      });
    })();
  </script>

  <!-- tambahan supaya WA link tidak usah konflik -->
  <!-- btn pesan via wa sudah pakai target _blank biar gak ninggalin page -->
</body>
</html>
