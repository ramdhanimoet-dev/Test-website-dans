<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>JURAGAN DANSFAHIRAAA · modern</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #f5f5f7;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .bio-card {
            max-width: 420px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            padding: 28px 22px;
            box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0, 0, 0, 0.02) inset;
            border: 1px solid #f0f0f0;
        }

        .header {
            margin-bottom: 28px;
            text-align: left;
            padding-left: 4px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.03em;
            color: #1d1d1f;
            margin-bottom: 4px;
        }

        .header h1 span {
            color: #e11d48;
            font-weight: 800;
        }

        .sub-judul {
            font-size: 0.95rem;
            font-weight: 400;
            color: #6b6b70;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }

        .sub-judul i {
            color: #e11d48;
            font-size: 0.8rem;
        }

        /* bio-text dihapus (tidak ada teks perantara) */

        .link-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 8px 0 28px;  /* margin atas dikurangi karena bio-text hilang */
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            padding: 16px 20px;
            border-radius: 16px;
            text-decoration: none;
            color: #1d1d1f;
            font-weight: 550;
            font-size: 1.1rem;
            border: 1.5px solid #e9e9ed;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.01);
        }

        .link-item:hover {
            border-color: #e11d48;
            background: #fef2f4;
            transform: scale(1.01);
        }

        .link-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .link-left i {
            font-size: 1.7rem;
            width: 30px;
            color: #e11d48;
        }

        .link-arrow {
            color: #8e8e98;
            font-size: 1.3rem;
            transition: transform 0.2s;
        }

        .link-item:hover .link-arrow {
            transform: translateX(4px);
            color: #e11d48;
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1.5px solid #efeff1;
            color: #6b6b70;
            font-size: 0.95rem;
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .footer .copyright {
            color: #8e8e98;
        }

        .footer .est {
            background: #f1f1f3;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.85rem;
            color: #4b4b52;
        }

        /* semua teks keterangan telah dihapus */
    </style>
</head>
<body>
    <div class="bio-card">
        <!-- HEADER -->
        <div class="header">
            <h1>
                JURAGAN <br><span>DANSFAHIRAAA</span>
            </h1>
            <div class="sub-judul">
                <i class="fas fa-circle" style="font-size: 0.4rem;"></i> 
                modern connection
                <i class="fas fa-circle" style="font-size: 0.4rem;"></i>
            </div>
        </div>

        <!-- BIO TEXT TELAH DIHAPUS (sesuai perintah) -->

        <!-- LINK-LINK -->
        <div class="link-list">
            <!-- WhatsApp -->
            <a href="https://wa.me/628815042954" class="link-item">
                <span class="link-left">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </span>
                <span class="link-arrow"><i class="fas fa-arrow-right"></i></span>
            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/juragandansfahiraaa.id" class="link-item">
                <span class="link-left">
                    <i class="fab fa-instagram"></i> Instagram
                </span>
                <span class="link-arrow"><i class="fas fa-arrow-right"></i></span>
            </a>

            <!-- Saluran Informasi -->
            <a href="https://whatsapp.com/channel/0029VbBuTR70VycGtYmL5i14" class="link-item">
                <span class="link-left">
                    <i class="fas fa-bullhorn"></i> Saluran Info
                </span>
                <span class="link-arrow"><i class="fas fa-arrow-right"></i></span>
            </a>

            <!-- Grub WhatsApp -->
            <a href="https://chat.whatsapp.com/EzcbdTjH4EM0gRdSNVKqh2?mode=hq1tcla" class="link-item">
                <span class="link-left">
                    <i class="fab fa-whatsapp"></i> Grub WhatsApp
                </span>
                <span class="link-arrow"><i class="fas fa-arrow-right"></i></span>
            </a>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <span class="copyright"><i class="far fa-copyright"></i> Juragan DansFahiraaa.</span>
            <span class="est">Est 2026</span>
        </div>

        <!-- TIDAK ADA KETERANGAN APAPUN DI BAWAH -->
    </div>
</body>
</html>
