<!DOCTYPE html>
<html>
<head>

<title>RW MLBB GRATIS</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
overflow:hidden;
color:white;
text-align:center;
background:black;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* PAGE */

.page{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

/* TITLE */

h1{
font-size:10vw;
letter-spacing:3px;
text-shadow:0 0 20px #8a2cff;
}

h2{
font-size:7vw;
color:#8a2cff;
text-shadow:0 0 10px #8a2cff;
}

/* CARD */

.card{
width:95%;
max-width:420px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
padding:30px;
border-radius:18px;
box-shadow:0 0 40px rgba(140,0,255,0.6);
}

/* INPUT */

input{
width:100%;
padding:18px;
margin:12px 0;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.1);
color:white;
font-size:18px;
}

input::placeholder{
color:#ccc;
}

/* BUTTON */

button{
width:100%;
padding:20px;
font-size:20px;
border:none;
border-radius:14px;
cursor:pointer;
background:linear-gradient(45deg,#8a2cff,#00e5ff);
color:white;
box-shadow:
0 0 10px #8a2cff,
0 0 20px #8a2cff,
0 0 30px #00e5ff;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* SMALL TEXT */

p{
margin-top:10px;
font-size:12px;
color:#bbb;
}

</style>
</head>

<body>

<canvas id="space"></canvas>

<div id="welcome" class="page">

<h1>WELCOME</h1>
<h2>RW MLBB GRATIS</h2>

<p style="margin:20px">TAP OPEN TO START</p>

<button onclick="openPage()">OPEN</button>

</div>

<div id="form" class="page" style="display:none">

<div class="card">

<h3 style="margin-bottom:15px">JOIN EVENT</h3>

<input id="username" placeholder="Username ML">
<input id="idml" placeholder="ID ML">
<input id="server" placeholder="Server">

<button onclick="kirim()">Submit</button>

<p>Isi data dengan benar untuk mengikuti event</p>

</div>

</div>

<script>

/* PINDAH HALAMAN */

function openPage(){
document.getElementById("welcome").style.display="none"
document.getElementById("form").style.display="flex"
}

function kirim(){

let username=document.getElementById("username").value
let idml=document.getElementById("idml").value
let server=document.getElementById("server").value

alert(
"Data terkirim!\n\n"+
"Username: "+username+
"\nID: "+idml+
"\nServer: "+server
)

}

/* NEBULA BACKGROUND */

const canvas=document.getElementById("space")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]

for(let i=0;i<200;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.4
})
}

function draw(){

ctx.fillStyle="black"
ctx.fillRect(0,0,canvas.width,canvas.height)

for(let s of stars){

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(s.x,s.y,s.size,0,Math.PI*2)
ctx.fill()

s.y+=s.speed

if(s.y>canvas.height){
s.y=0
s.x=Math.random()*canvas.width
}

}

let gradient=ctx.createRadialGradient(
canvas.width/2,
canvas.height/2,
100,
canvas.width/2,
canvas.height/2,
600
)

gradient.addColorStop(0,"rgba(140,0,255,0.5)")
gradient.addColorStop(1,"transparent")

ctx.fillStyle=gradient
ctx.fillRect(0,0,canvas.width,canvas.height)

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
