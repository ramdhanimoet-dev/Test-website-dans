<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LUDO KOTAK</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
margin:0;
}

#board{
display:grid;
grid-template-columns:repeat(20,22px);
grid-gap:2px;
justify-content:center;
margin:20px auto;
}

.tile{
width:22px;
height:22px;
background:#333;
}

.piece{
width:18px;
height:18px;
}

.red{background:red;}
.blue{background:blue;}
.green{background:lime;}
.yellow{background:yellow;}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:8px;
background:#00c3ff;
color:black;
}

#dice{
font-size:40px;
margin:10px;
}

#toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:10px 20px;
border-radius:8px;
display:none;
}

#winnerScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000e0;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:40px;
animation:zoom 0.6s;
}

.rank{
margin:15px;
padding:10px 30px;
background:#222;
border-radius:10px;
}

@keyframes zoom{
from{transform:scale(0);opacity:0;}
to{transform:scale(1);opacity:1;}
}

</style>
</head>

<body>

<h2>LUDO KOTAK</h2>

<div id="dice">🎲</div>

<button onclick="rollDice()">LEMpar DADU</button>

<h3 id="turn">Giliran: red</h3>

<div id="board"></div>

<div id="toast"></div>

<div id="winnerScreen"></div>

<script>

const board=document.getElementById("board")

for(let i=0;i<80;i++){
let tile=document.createElement("div")
tile.className="tile"
tile.id="t"+i
board.appendChild(tile)
}

let players=[
{color:"red",pieces:[0,0,0,0]},
{color:"blue",pieces:[0,0,0,0]},
{color:"green",pieces:[0,0,0,0]},
{color:"yellow",pieces:[0,0,0,0]}
]

let turn=0
let totalPlayers=4
let winners=[]

function draw(){

document.querySelectorAll(".piece").forEach(p=>p.remove())

players.forEach(p=>{
p.pieces.forEach(pos=>{
let el=document.createElement("div")
el.className="piece "+p.color
document.getElementById("t"+pos).appendChild(el)
})
})

}

draw()

function rollDice(){

let diceEl=document.getElementById("dice")

let spin=setInterval(()=>{
diceEl.innerText=Math.floor(Math.random()*6)+1
},80)

setTimeout(()=>{

clearInterval(spin)

let dice=Math.floor(Math.random()*6)+1

diceEl.innerText=dice

movePiece(dice)

},1000)

}

function movePiece(dice){

let player=players[turn]

player.pieces[0]+=dice

if(player.pieces[0]>=79){

player.pieces[0]=79

if(!winners.includes(turn)){
winners.push(turn)
}

if(winners.length>=3){
showWinners()
return
}

}

players.forEach((p,i)=>{

if(i!=turn){

p.pieces.forEach((pos,index)=>{

if(pos==player.pieces[0]){

p.pieces[index]=0

toast("MAMPUS KE MAKAN BIJI LU")

}

})

}

})

draw()

turn++

if(turn>=totalPlayers)turn=0

document.getElementById("turn").innerText="Giliran: "+players[turn].color

}

function toast(text){

let t=document.getElementById("toast")

t.innerText=text

t.style.display="block"

setTimeout(()=>{
t.style.display="none"
},2000)

}

function showWinners(){

let screen=document.getElementById("winnerScreen")

let text=""

if(winners[0]!=undefined){
text+=`<div class="rank">🏆 ANJAY JUARA 1 - ${players[winners[0]].color}</div>`
}

if(winners[1]!=undefined){
text+=`<div class="rank">🥈 JUARA 2 LUMAYAN - ${players[winners[1]].color}</div>`
}

if(winners[2]!=undefined){
text+=`<div class="rank">🥉 JUARA 3 YAUDAHLAH - ${players[winners[2]].color}</div>`
}

screen.innerHTML=text

screen.style.display="flex"

}

</script>

</body>
</html>
