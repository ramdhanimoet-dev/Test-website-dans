<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>JURAGAN DANSFAHIRAAA · modern</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #f5f5f7;  /* dasar abu-abu modern */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .bio-card {
            max-width: 420px;  /* proporsi enak di hp */
            width: 100%;
            background: #ffffff;
            border-radius: 24px;  /* nggak terlalu melengkung */
            padding: 28px 22px;
            box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0, 0, 0, 0.02) inset;
            transition: transform 0.2s;
            border: 1px solid #f0f0f0;
        }

        /* header tanpa bintang, teks bold modern */
        .header {
            margin-bottom: 28px;
            text-align: left;
            padding-left: 4px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.03em;
            color: #1d1d1f;  /* dark modern */
            margin-bottom: 4px;
        }

        .header h1 span {
            color: #e11d48;  /* aksen pink tipis */
            font-weight: 800;
        }

        .sub-judul {
            font-size: 0.95rem;
            font-weight: 400;
            color: #6b6b70;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }

        .sub-judul i {
            color: #e11d48;
            font-size: 0.8rem;
        }

        /* bio singkat / headline */
        .bio-text {
            background: #f8f8fa;
            border-radius: 18px;
            padding: 16px 18px;
            margin: 22px 0 28px 0;
            font-size: 1rem;
            color: #2c2c2e;
            border: 1px solid #efeff1;
            font-weight: 450;
            line-height: 1.4;
        }

        .bio-text i {
            color: #e11d48;
            margin-right: 6px;
        }

        /* list link - modern, minimal, pinggiran lurus */
        .link-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 24px 0 28px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            padding: 16px 20px;
            border-radius: 16px;  /* lebih kotak modern */
            text-decoration: none;
            color: #1d1d1f;
            font-weight: 550;
            font-size: 1.1rem;
            border: 1.5px solid #e9e9ed;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.01);
        }

        /* aksen pink hanya di icon dan sedikit border saat hover */
        .link-item:hover {
            border-color: #e11d48;
            background: #fef2f4;
            transform: scale(1.01);
        }

        .link-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .link-left i {
            font-size: 1.7rem;
            width: 30px;
            color: #e11d48;  /* pink konsisten */
        }

        .link-arrow {
            color: #8e8e98;
            font-size: 1.3rem;
            transition: transform 0.2s;
        }

        .link-item:hover .link-arrow {
            transform: translateX(4px);
            color: #e11d48;
        }

        /* footer */
        .footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1.5px solid #efeff1;
            color: #6b6b70;
            font-size: 0.95rem;
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .footer .copyright {
            color: #8e8e98;
        }

        .footer .est {
            background: #f1f1f3;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.85rem;
            color: #4b4b52;
        }

        /* tips kecil */
        .hint {
            text-align: center;
            margin-top: 16px;
            font-size: 0.8rem;
            color: #a1a1aa;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .hint i {
            color: #e11d48;
        }

        /* nggak ada bintang, nggak ada lengkung berlebihan, pink cuma aksen */
    </style>
</head>
<body>
    <div class="bio-card">
        <!-- HEADER: judul JURAGAN DANSFAHIRAAA dengan sedikit aksen pink di "DANSFAHIRAAA" -->
        <div class="header">
            <h1>
                JURAGAN <br><span>DANSFAHIRAAA</span>
            </h1>
            <div class="sub-judul">
                <i class="fas fa-circle" style="font-size: 0.4rem;"></i> 
                modern connection
                <i class="fas fa-circle" style="font-size: 0.4rem;"></i>
            </div>
        </div>

        <!-- pengganti avatar / teks bio, tanpa bintang -->
        <div class="bio-text">
            <i class="fas fa-bolt"></i> Tap langsung tanpa tab baru · semua link direct ke app / web
        </div>

        <!-- LINK-LINK (target same tab, tanpa _blank) -->
        <div class="link-list">
            <!-- WhatsApp -->
            <a href="https://wa.me/628815042954" class="link-item">
                <span class="link-left">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </span>
                <span class="link-arrow"><i class="fas fa-arrow-right"></i></span>
            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/juragandansfahiraaa.id" class="link-item">
                <span class="link-left">
                    <i class="fab fa-instagram"></i> Instagram
                </span>
                <span class="link-arrow"><i class="fas fa-arrow-right"></i></span>
            </a>

            <!-- Saluran Informasi (WhatsApp Channel) -->
            <a href="https://whatsapp.com/channel/0029VbBuTR70VycGtYmL5i14" class="link-item">
                <span class="link-left">
                    <i class="fas fa-bullhorn"></i> Saluran Info
                </span>
                <span class="link-arrow"><i class="fas fa-arrow-right"></i></span>
            </a>

            <!-- Grub WhatsApp -->
            <a href="https://chat.whatsapp.com/EzcbdTjH4EM0gRdSNVKqh2?mode=hq1tcla" class="link-item">
                <span class="link-left">
                    <i class="fab fa-whatsapp"></i> Grub WhatsApp
                </span>
                <span class="link-arrow"><i class="fas fa-arrow-right"></i></span>
            </a>
        </div>

        <!-- FOOTER dengan est 2026 -->
        <div class="footer">
            <span class="copyright"><i class="far fa-copyright"></i> Juragan DansFahiraaa.</span>
            <span class="est">Est 2026</span>
        </div>

        <!-- hint kecil -->
        <div class="hint">
            <i class="fas fa-hand-pointer"></i> langsung terbuka (tanpa tab baru)
        </div>
    </div>

    <!-- nggak ada bintang, nggak pink dominan, pinggiran nggak terlalu lengkung (16-24px) -->
    <!-- semua link langsung di tab yang sama / buka app -->
</body>
</html>
