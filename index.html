<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>DansFahiraaa · modern store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 0 0 24px 0;
      background: #f5f5f7; /* fallback color */
      position: relative;
    }

    /* background dengan gambar - pake link imgbb biar stabil */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('https://i.ibb.co/bRP0H0B/background.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      opacity: 0.25; /* biar teks kebaca */
      z-index: 0;
      pointer-events: none;
    }

    /* overlay putih biar teks jelas */
    body::after {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(255, 255, 255, 0.6);
      z-index: 1;
      pointer-events: none;
    }

    .store-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 400px;
      margin: 16px auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 0 16px;
    }

    /* header */
    .header-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 32px;
      padding: 14px 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255,255,255,0.8);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-img {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      object-fit: cover;
      background: #f0f0f0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      border: 2px solid white;
    }

    .brand-text {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #1a1e2b;
    }

    /* product card */
    .product-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 36px;
      padding: 22px 18px 20px 18px;
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow: 0 20px 35px -8px rgba(0,0,0,0.15);
    }

    .product-image {
      width: 100%;
      border-radius: 28px;
      overflow: hidden;
      background: #f8f8f8;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05), 0 10px 20px -10px rgba(0,0,0,0.2);
      margin-bottom: 16px;
    }

    .product-image img {
      width: 100%;
      height: auto;
      display: block;
    }

    .desc-area {
      padding: 4px 6px 12px 6px;
    }

    .detail-list {
      background: rgba(240, 240, 250, 0.7);
      border-radius: 22px;
      padding: 16px 18px;
      margin: 10px 0 16px 0;
      font-size: 1rem;
      border: 1px solid rgba(255,255,255,0.6);
    }

    .detail-list p {
      margin: 8px 0;
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
    }

    .label {
      font-weight: 700;
      min-width: 100px;
      color: #2d2f4a;
    }

    .value {
      font-weight: 500;
      color: #111;
    }

    .price-tag {
      font-size: 1.7rem;
      font-weight: 800;
      color: #1f2937;
      margin-left: 8px;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 12px 0 16px 0;
    }

    .btn {
      border: none;
      border-radius: 60px;
      padding: 16px 22px;
      font-weight: 600;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      color: #1e1e2a;
      box-shadow: 0 6px 16px rgba(0,0,0,0.1);
    }

    .btn i {
      font-size: 1.3rem;
    }

    .btn-spek {
      background: #1a2639;
      color: white;
    }

    .btn-wa {
      background: #25D366;
      color: #075e23;
    }

    .btn-wa i {
      color: #075e23;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .reminder-text {
      background: rgba(0, 0, 0, 0.05);
      border-radius: 60px;
      padding: 14px 18px;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 500;
      color: #11131f;
      border: 1px dashed rgba(0,0,0,0.2);
      margin-top: 6px;
    }

    /* overlay spek */
    .spek-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.5);
      backdrop-filter: blur(5px);
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .spek-card {
      background: white;
      width: 90%;
      max-width: 380px;
      border-radius: 48px;
      padding: 28px 24px;
      box-shadow: 0 40px 70px rgba(0,0,0,0.4);
      text-align: center;
    }

    .spek-card h3 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #141b29;
    }

    .foto-lengkap-grid {
      background: #f5f5f5;
      border-radius: 28px;
      padding: 20px;
      margin: 15px 0;
    }

    .foto-lengkap-grid img {
      width: 100%;
      border-radius: 20px;
      border: 3px solid white;
      box-shadow: 0 8px 15px rgba(0,0,0,0.2);
    }

    .btn-tutup {
      background: #212529;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 16px 20px;
      font-size: 1.2rem;
      width: 100%;
      font-weight: 600;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="store-container">
    <!-- header -->
    <div class="header-card">
      <img src="https://ibb.co.com/VYvqFDqR" alt="logo DansFahiraaa" class="logo-img" onerror="this.src='https://via.placeholder.com/52?text=Logo'">
      <span class="brand-text">DansFahiraaa</span>
    </div>

    <!-- product card -->
    <div class="product-card">
      <div class="product-image">
        <img src="https://ibb.co.com/B2J1Ktbc" alt="Produk Monsep" onerror="this.src='https://via.placeholder.com/400x300?text=Produk'">
      </div>

      <div class="desc-area">
        <div class="detail-list">
          <p><span class="label">𝗠𝗢𝗡𝗦𝗘𝗣</span></p>
          <p><span class="label">TAKE SGMAIL FRESH</span> <span class="value">-PLAT GOOGLE R</span></p>
          <p style="margin-top: 12px;"><span class="label">𝗛𝗔𝗥𝗚𝗔</span> <span class="value price-tag">idr 22.000</span></p>
        </div>

        <div class="button-group">
          <a href="javascript:void(0);" class="btn btn-spek" id="showSpekBtn">
            <i class="fa-solid fa-microchip"></i> SPEK LENGKAP
          </a>

          <a href="https://wa.me/6283878779524?text=Halo%20DansFahiraaa%2C%20saya%20mau%20order%20MONSESP%20SGMAIL%20FRESH%20-%20idr%2022.000" target="_blank" class="btn btn-wa">
            <i class="fa-brands fa-whatsapp"></i> PESAN VIA WA
          </a>
        </div>

        <div class="reminder-text">
          <i class="fa-regular fa-camera"></i> Harap Sertakan Screenshot Akun Yang Ingin Anda Beli
        </div>
      </div>
    </div>
  </div>

  <!-- SPEK LENGKAP OVERLAY -->
  <div class="spek-overlay" id="spekOverlay">
    <div class="spek-card">
      <h3>✨ SPEK LENGKAP</h3>
      <div class="foto-lengkap-grid">
        <img src="https://ibb.co.com/B2J1Ktbc" alt="foto lengkap produk" onerror="this.src='https://via.placeholder.com/300?text=Foto+Lengkap'">
        <p style="margin-top: 15px; font-weight: 500;">✓ Foto dokumentasi lengkap</p>
        <p style="opacity:0.7; font-size:0.9rem;">(all angle + kelengkapan)</p>
      </div>
      <button class="btn-tutup" id="closeSpekBtn"><i class="fa-regular fa-circle-xmark"></i> TUTUP</button>
    </div>
  </div>

  <script>
    const showBtn = document.getElementById('showSpekBtn');
    const overlay = document.getElementById('spekOverlay');
    const closeBtn = document.getElementById('closeSpekBtn');

    showBtn.addEventListener('click', function(e) {
      e.preventDefault();
      overlay.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    });

    closeBtn.addEventListener('click', function() {
      overlay.style.display = 'none';
      document.body.style.overflow = 'auto';
    });

    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) {
        overlay.style.display = 'none';
        document.body.style.overflow = 'auto';
      }
    });
  </script>
</body>
</html>
